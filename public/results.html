<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>경기 결과 | Spurs Pulse</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Spurs Pulse 홈">
        <span class="brand-mark">TH</span>
        <span>
          <strong>Spurs Pulse</strong>
          <small>Tottenham fan desk</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="주요 섹션">
        <a href="./korean.html">국문 피드</a>
        <a href="./english.html">영문 피드</a>
        <a href="./market.html">이적 시장</a>
        <a href="./community.html?team=tottenham">토트넘 커뮤니티</a>
        <a href="./players.html">선수단</a>
        <a href="./injuries.html">부상 이력</a>
        <a href="./results.html">경기 결과</a>
        <a href="./worldcup.html">월드컵</a>
      </nav>
    </header>

    <main>
      <section class="result-page">
        <div class="squad-heading">
          <div>
            <p class="eyebrow">Season results</p>
            <h1>경기 결과</h1>
          </div>
          <div class="live-controls">
            <span id="resultStatus">경기 결과 확인 중</span>
            <button id="refreshResults" class="icon-button" type="button" title="경기 결과 새로고침" aria-label="경기 결과 새로고침">↻</button>
          </div>
        </div>

        <div id="resultStats" class="squad-stats result-stats" aria-label="경기 결과 요약"></div>

        <div id="resultSeasons" class="season-tabs" aria-label="시즌 선택">
          <button class="filter is-active" type="button" data-result-season="2026">26/27</button>
          <button class="filter" type="button" data-result-season="2025">25/26</button>
          <button class="filter" type="button" data-result-season="2024">24/25</button>
          <button class="filter" type="button" data-result-season="2023">23/24</button>
        </div>

        <div class="squad-toolbar">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="resultSearch" type="search" placeholder="상대, 대회, 라운드 검색" autocomplete="off" />
          </label>
          <div id="resultFilters" class="filter-row result-filter-row" aria-label="대회 필터">
            <button class="filter is-active" type="button" data-result-filter="ALL">전체</button>
          </div>
        </div>

        <div id="resultEmpty" class="empty-state squad-empty" hidden>표시할 경기 결과가 없습니다.</div>

        <div class="result-table-wrap">
          <table class="result-table">
            <thead>
              <tr>
                <th scope="col">일자</th>
                <th scope="col">대회</th>
                <th scope="col">상대</th>
                <th scope="col">장소</th>
                <th scope="col">스코어</th>
                <th scope="col">결과</th>
                <th scope="col">원문</th>
              </tr>
            </thead>
            <tbody id="resultTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
