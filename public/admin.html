<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 | Spurs Pulse</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/index.html" aria-label="Spurs Pulse 홈">
        <span class="brand-mark">TH</span>
        <span>
          <strong>Spurs Pulse</strong>
          <small>Admin desk</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="관리자 이동">
        <a href="/community.html?team=tottenham">커뮤니티</a>
        <a href="/index.html">홈</a>
      </nav>
    </header>

    <main>
      <section id="adminPage" class="admin-page">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Admin only</p>
            <h1>관리자</h1>
            <p class="page-lead">방문자 수, 페이지 조회, 재방문율 같은 운영 지표는 여기서만 확인합니다.</p>
          </div>
          <div class="live-controls">
            <span id="adminStatus">관리자 키를 입력하세요.</span>
          </div>
        </div>

        <form id="adminLoginForm" class="admin-login">
          <label>
            <span>관리자 키</span>
            <input id="adminKey" type="password" placeholder="COMMUNITY_ADMIN_KEY" autocomplete="current-password" />
          </label>
          <button class="primary-action" type="submit">확인</button>
          <button id="adminRefresh" class="pager-button" type="button">새로고침</button>
          <button id="adminLogout" class="pager-button" type="button">잠금</button>
        </form>

        <div id="adminMetrics" class="community-analytics admin-metrics" aria-label="운영 지표"></div>

        <div class="admin-panels">
          <section class="admin-panel">
            <h2>많이 본 페이지</h2>
            <ul id="adminTopPages" class="admin-list"></ul>
          </section>
          <section class="admin-panel">
            <h2>방문 국가</h2>
            <ul id="adminCountries" class="admin-list"></ul>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
