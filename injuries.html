<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부상 이력 | Spurs Pulse</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Spurs Pulse 홈">
        <span class="brand-mark">TH</span>
        <span>
          <strong>Spurs Pulse</strong>
          <small>Tottenham fan desk</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="주요 섹션">
        <a href="./korean.html">국문 피드</a>
        <a href="./english.html">영문 피드</a>
        <a href="./market.html">이적 시장</a>
        <a href="./players.html">선수단</a>
        <a href="./injuries.html">부상 이력</a>
        <a href="./results.html">경기 결과</a>
        <a href="./worldcup.html">월드컵</a>
      </nav>
    </header>

    <main>
      <section class="injury-page">
        <div class="squad-heading">
          <div>
            <p class="eyebrow">Season injury history</p>
            <h1>부상 이력</h1>
          </div>
          <div class="live-controls">
            <span id="injuryStatus">부상 이력 확인 중</span>
            <button id="refreshInjuries" class="icon-button" type="button" title="부상 이력 새로고침" aria-label="부상 이력 새로고침">↻</button>
          </div>
        </div>

        <div id="injuryStats" class="squad-stats" aria-label="부상 이력 요약"></div>

        <div id="injurySeasons" class="season-tabs" aria-label="시즌 선택">
          <button class="filter is-active" type="button" data-injury-season="2025">25/26</button>
          <button class="filter" type="button" data-injury-season="2024">24/25</button>
          <button class="filter" type="button" data-injury-season="2023">23/24</button>
        </div>

        <div class="squad-toolbar">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="injurySearch" type="search" placeholder="선수, 부상, 포지션 검색" autocomplete="off" />
          </label>
          <div id="injuryFilters" class="filter-row" aria-label="부상 이력 필터">
            <button class="filter is-active" type="button" data-injury-filter="ALL">전체</button>
            <button class="filter" type="button" data-injury-filter="EXPECTED">복귀 예정</button>
            <button class="filter" type="button" data-injury-filter="GK">GK</button>
            <button class="filter" type="button" data-injury-filter="DF">DF</button>
            <button class="filter" type="button" data-injury-filter="MF">MF</button>
            <button class="filter" type="button" data-injury-filter="FW">FW</button>
          </div>
        </div>

        <div id="injuryEmpty" class="empty-state squad-empty" hidden>표시할 부상 이력이 없습니다.</div>

        <div class="injury-table-wrap">
          <table class="injury-table">
            <thead>
              <tr>
                <th scope="col">사진</th>
                <th scope="col">선수</th>
                <th scope="col">부상</th>
                <th scope="col">구간</th>
                <th scope="col">결장</th>
                <th scope="col">상태</th>
              </tr>
            </thead>
            <tbody id="injuryTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
